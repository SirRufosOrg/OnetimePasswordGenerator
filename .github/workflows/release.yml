name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1

jobs:
  build:
    strategy:
      matrix:
        include:
          - rid: win-x64
            suffix: windows-x64
          #- rid: win-arm64
          #  suffix: windows-arm64
          - rid: osx-x64
            suffix: macos-x64
          #- rid: osx-arm64
          #  suffix: macos-arm64

    runs-on: [self-hosted, Linux]

    steps:
      - name: Test zip availability
        run: zip -v

      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        env:
          DOTNET_INSTALL_DIR: "./.dotnet"
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore src/otpApp

      - name: Publish Windows
        if: ${{ startsWith(matrix.rid, 'win') }}
        run: |
          dotnet publish src/otpApp \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -o publish/raw \
            -p:ReadyToRun=true \
            -p:DebugType=none \
            -p:PublishSingleFile=true \
            -p:IncludeAllContentForSelfExtract=true \
            -p:IncludeNativeLibrariesForSelfExtract=true

      - name: Publish OSX
        if: ${{ startsWith(matrix.rid, 'osx') }}
        run: |
          dotnet publish src/otpApp \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained \
            -o publish/raw \
            -p:ReadyToRun=true \
            -p:DebugType=none

      - name: Remove debug symbols
        run: |
          find publish/raw -type f -name "*.pdb" -delete

      - name: Create macOS app bundle
        if: ${{ startsWith(matrix.rid, 'osx') }}
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUNDLE="publish/bundle/otpApp.app"
          mkdir -p "$BUNDLE/Contents/MacOS" "$BUNDLE/Contents/Resources"
          cp -R publish/raw/ "$BUNDLE/Contents/MacOS/"
          sed "s/VERSION/$VERSION/g" src/otpApp/Platform/macOS/Info.plist > "$BUNDLE/Contents/Info.plist"          

      - name: Prepare upload
        id: prep
        shell: bash
        run: |
          if [ -d "publish/bundle/otpApp.app" ]; then
            cd publish/bundle
            zip -r "../otpApp-${{ matrix.suffix }}.app.zip" *
            echo "path=publish/otpApp-${{ matrix.suffix }}.app.zip" >> "$GITHUB_OUTPUT"
          else
            cd publish/raw
            zip -r "../otpApp-${{ matrix.suffix }}.zip" *
            echo "path=publish/otpApp-${{ matrix.suffix }}.zip" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otpApp-${{ matrix.suffix }}
          path: ${{ steps.prep.outputs.path }}

  release:
    needs: build
    runs-on: [self-hosted, Linux]
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create release archives
        shell: bash
        run: |
          for dir in otpApp-*/; do
            name="${dir%/}"
            zip -r "${name}.zip" "${dir}"
          done

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: otpApp-*.zip
          generate_release_notes: true
